ros2can_gui:
  ros__parameters:
    # スキャン対象から除外するポートのリスト
    # 他プロセス(serial_bridge等)が既に使用しているポートや、センサ用の
    # シリアル変換モジュール等、マイコン通信と干渉するポートを指定する
    # 例: excluded_ports: ["/dev/ttyUSB0", "/dev/ttyACM1"]
    excluded_ports: []

    # RX タイムアウト（秒）: この時間内にデータを受信しなければポートを閉じる
    rx_timeout_sec: 2.0

    # 再接続インターバル（秒）: 切断後に再接続を試みるまでの最小待機時間
    reconnect_interval_sec: 3.0

    # デバイスのスキャンインターバル（ミリ秒）: 新規デバイスを探索する間隔
    scan_interval_ms: 5000

    # ポートプローブ時の読み取りタイムアウト（秒）: この時間内に有効なフレームが
    # 受信できなければそのポートには何も繋がっていないと判断する
    probe_timeout_sec: 2.0

    # ポートを開いた直後の安定待ち時間（秒）: USB CDCの立ち上がり待ち
    probe_settle_sec: 0.5
